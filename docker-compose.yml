version: '3.8'

services:
  # Layanan Web Statis (Nginx)
  container-statis:
    image: maemunah/uas_statis:latest
    container_name: container-statis
    ports:
      - "80:80"
    restart: always

  # Layanan Web Dinamis (PHP CRUD)
  container-dinamis:
    image: maemunah/uas_dinamis:latest
    container_name: container-dinamis
    ports:
      - "3000:80"
    environment:
      DATABASE_HOST: db-webdinamis
      DATABASE_USER: uas_user
      DATABASE_PASSWORD: uas_password
      DATABASE_NAME: uas_db
    depends_on:
      db-webdinamis:
        condition: service_healthy
    restart: always

  # Layanan Database MariaDB
  db-webdinamis:
    image: mariadb:10.6
    container_name: db-webdinamis
    environment:
      MARIADB_ROOT_PASSWORD: root_password
      MARIADB_DATABASE: uas_db
      MARIADB_USER: uas_user
      MARIADB_PASSWORD: uas_password
    volumes:
      - db_data:/var/lib/mysql
      - /home/ubuntu/docker-aws/web-dinamis/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "uas_user", "-puas_password"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  db_data:
